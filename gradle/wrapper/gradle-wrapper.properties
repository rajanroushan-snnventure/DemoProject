# Gradle 8.14.1 — compatible with AGP 8.5.2 and Kotlin 2.0.21.
#
# The getDependencyProject() crash (Gradle 8.8+) is fixed by upgrading Kotlin to
# 2.0.21, where KGP no longer calls the removed API. No need to pin to 8.7 anymore.
#
# Compatible stack:
#   Gradle  8.14.1  (latest stable; 8.14.4 is not yet released as of March 2026)
#   AGP     8.5.2   requires Gradle >= 8.7, works fine with 8.14.1
#   Kotlin  2.0.21  KGP no longer calls getDependencyProject()
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.14.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
